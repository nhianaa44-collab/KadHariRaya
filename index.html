<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kad Raya Digital</title>
<style>
body {
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
video {
    width:100%;
    height:100%;
    object-fit:contain;
    cursor: default;
}
</style>
</head>
<body>

<video id="videoPlayer" autoplay muted playsinline></video>

<script>
const video = document.getElementById("videoPlayer")

// --- Step 1: video1 loops ---
video.src = "video1.mp4"
video.loop = true
video.style.cursor = "pointer"
video.play()

// preload next full video
const video2 = document.createElement("video")
video2.src = "video2.mp4"
video2.preload = "auto"

// --- Click handler for video1 ---
video.onclick = () => {
    // hide loop (not needed, same video element)
    // play full video2
    video.loop = false
    video.src = "video2.mp4"
    video.currentTime = 0
    video.style.cursor = "default"
    video.play()

    // Remove this click handler so it doesn't trigger again
    video.onclick = null

    // Preload next loop video (video3)
    const video3 = document.createElement("video")
    video3.src = "video3.mp4"
    video3.preload = "auto"
}

// --- When full video2 ends, show next loop (video3) ---
video.onended = () => {
    // Only triggers after video2
    video.loop = true
    video.src = "video3.mp4"
    video.currentTime = 0
    video.style.cursor = "pointer"
    video.play()

    // Add click to go to next full video if any
    video.onclick = () => {
        video.loop = false
        video.src = "video4.mp4" // next full video
        video.currentTime = 0
        video.play()
    video.style.cursor = "default"
        video.onclick = null
    }
}
</script>

</body>
</html>
